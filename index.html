<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <span class="brand-mark">
          <svg class="fox" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M9 9 L20 16 L11 22 Z" fill="currentColor"/>
            <path d="M39 9 L28 16 L37 22 Z" fill="currentColor"/>
            <path d="M24 14 C32 14 39 17 39 24 C39 33 32 41 24 41 C16 41 9 33 9 24 C9 17 16 14 24 14 Z" fill="currentColor"/>
            <path d="M24 41 C19 39 16 34 16.5 29 C19 31 21 32 24 32 C27 32 29 31 31.5 29 C32 34 29 39 24 41 Z" fill="var(--surface)"/>
            <circle cx="18.5" cy="25" r="2.2" fill="var(--surface)"/>
            <circle cx="29.5" cy="25" r="2.2" fill="var(--surface)"/>
            <circle cx="18.6" cy="25.2" r="1" fill="var(--accent-strong)"/>
            <circle cx="29.4" cy="25.2" r="1" fill="var(--accent-strong)"/>
            <circle cx="24" cy="30" r="1.9" fill="var(--accent-strong)"/>
          </svg>
        </span>
        <span class="brand-name">Tasks</span>
      </div>
      <div class="stats">
        <div class="stat-pill" id="streakPill" style="display:none"><span class="streak-dot"></span><b id="streakCount">0</b>-day streak</div>
        <div id="authArea"></div>
      </div>
    </div>

    <div class="mascot-card">
      <div class="mascot-avatar">
        <svg class="fox" viewBox="0 0 48 48" aria-hidden="true">
          <path d="M9 9 L20 16 L11 22 Z" fill="currentColor"/>
          <path d="M39 9 L28 16 L37 22 Z" fill="currentColor"/>
          <path d="M24 14 C32 14 39 17 39 24 C39 33 32 41 24 41 C16 41 9 33 9 24 C9 17 16 14 24 14 Z" fill="currentColor"/>
          <path d="M24 41 C19 39 16 34 16.5 29 C19 31 21 32 24 32 C27 32 29 31 31.5 29 C32 34 29 39 24 41 Z" fill="var(--surface)"/>
          <circle cx="18.5" cy="25" r="2.2" fill="var(--surface)"/>
          <circle cx="29.5" cy="25" r="2.2" fill="var(--surface)"/>
          <circle cx="18.6" cy="25.2" r="1" fill="var(--accent-strong)"/>
          <circle cx="29.4" cy="25.2" r="1" fill="var(--accent-strong)"/>
          <circle cx="24" cy="30" r="1.9" fill="var(--accent-strong)"/>
        </svg>
      </div>
      <div class="mascot-speech">
        <div class="mascot-line" id="mascotLine">A fresh page. Pick one thing to begin.</div>
        <div class="mascot-progress" title="Quiet progress"><div class="mascot-progress-fill" id="xpBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab('active',this)">To do</button>
      <button class="tab" onclick="setTab('done',this)">Done</button>
      <button class="tab" onclick="setTab('stats',this)">Progress</button>
      <button class="tab" onclick="setTab('achievements',this)">Milestones</button>
    </div>

    <div id="panelActive">
      <div class="cat-filters" id="catFilters"></div>
      <div class="add-row">
        <input id="taskInput" type="text" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()" />
        <select class="picker" id="catPick"></select>
        <select class="picker" id="xpPick" title="How much effort?">
          <option value="10">Quick</option>
          <option value="25" selected>Normal</option>
          <option value="50">Focused</option>
          <option value="100">Big</option>
        </select>
        <button class="btn-primary" onclick="addTask()">Add</button>
      </div>
      <div class="task-list" id="activeList"></div>
      <button class="focus-btn" onclick="openPomodoro()">Start a focus timer</button>
    </div>

    <div id="panelDone" style="display:none">
      <div class="cat-filters" id="catFiltersDone"></div>
      <div class="task-list" id="doneList"></div>
    </div>

    <div id="panelStats" style="display:none">
      <div id="statsContent"></div>
    </div>

    <div id="panelAchievements" style="display:none">
      <div class="section-label">Milestones</div>
      <div class="ach-grid" id="achRow"></div>
    </div>

    <div class="footer">
      Your data is saved on this device. <button onclick="resetAll()">Start over</button>
    </div>
  </div>

  <!-- Categories modal -->
  <div class="modal-bg" id="catModal" onclick="if(event.target.id==='catModal')closeCatModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeCatModal()">✕</button>
      <div class="modal-title">Manage categories</div>
      <div class="cat-list" id="catEditList"></div>
      <div class="new-cat-row">
        <input id="newCatName" type="text" placeholder="New category name..." maxlength="20" onkeydown="if(event.key==='Enter')addCategory()" />
        <button class="btn-ghost" onclick="addCategory()">+ Add</button>
      </div>
      <p style="font-size: 11px; color: var(--text-subtle); margin-top: 12px; line-height: 1.5;">Click a colored circle to change color. Deleting a category moves its tasks to General.</p>
    </div>
  </div>

  <!-- ============================
       FULLSCREEN POMODORO OVERLAY
       ============================ -->
  <div class="pomo-overlay" id="pomoOverlay">
    <div class="pomo-header">
      <div class="pomo-phase-label" id="pomoPhaseLabel">Focus</div>
      <div class="pomo-controls-top">
        <button class="pomo-icon-btn" id="pomoSoundBtn" onclick="toggleSound()" title="Toggle sound">🔊</button>
        <button class="pomo-icon-btn" onclick="closePomodoro()" title="Close">✕</button>
      </div>
    </div>

    <div class="pomo-center">
      <div class="pomo-clock" id="pomoClock"></div>
      <div class="pomo-time-edit" id="pomoTimeEdit">
        <div class="pomo-time-edit-row">
          <span>Focus:</span>
          <input type="number" id="pomoFocusMins" min="1" max="120" value="25" onchange="updatePhaseDuration('focus')" />
          <span>min</span>
        </div>
        <div class="pomo-time-edit-row">
          <span>Break:</span>
          <input type="number" id="pomoBreakMins" min="1" max="60" value="5" onchange="updatePhaseDuration('break')" />
          <span>min</span>
        </div>
      </div>
      <div class="pomo-task-card" id="pomoTaskCard"></div>
      <div class="pomo-controls" id="pomoControls"></div>
      <div class="pomo-next-list" id="pomoNextList" style="display:none"></div>
    </div>

    <div></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <!-- app.js was split into these modules (plain scripts sharing global scope).
       Load order matters: each file's top-level code may use anything defined
       in the files above it. main.js (boot) must load last. -->
  <script src="auth.js"></script>
  <script src="sync.js"></script>
  <script src="state.js"></script>
  <script src="pomodoro.js"></script>
  <script src="ui.js"></script>
  <script src="stats.js"></script>
  <script src="main.js"></script>
</body>
</html>
